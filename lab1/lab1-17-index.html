    <div id="a">
        <h3>校园简介</h3>
        <p>我们的校园在秋天格外美丽，金黄的树叶装点着整个校园，让整个校园布满了金黄的色彩，十分美丽。</p>
        <img src="TUPIAN.jpg"alt="校园秋景">
   <div id="b">
        <h3>秋日景色</h3>
        <p>秋天的校园，树叶变成了金黄色，&nbsp;&nbsp;&nbsp;地上铺满了落叶。</p>
        <p>阳光透过树叶洒在地上，<br>形成斑驳的光影，同学们站在树下，光影打下尽显青春气息。</p>
    </div>
    <div id="c">
        <h3>秋韵诗词</h3>
        <p>秋高气爽，校园如画。</p>
        <p>枫叶红于二月花，<br>银杏金黄满枝桠。多美的诗句，多美的风景</p>
    </div>
